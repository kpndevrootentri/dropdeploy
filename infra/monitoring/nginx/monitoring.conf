# DropDeploy Monitoring Dashboard — Nginx vhost (Linux production)
#
# Deploy:
#   1. Copy to /etc/nginx/sites-enabled/monitoring.conf
#   2. Replace YOUR_BASE_DOMAIN with your actual domain (e.g. en3.wtf)
#   3. Install htpasswd: apt-get install -y apache2-utils
#   4. Create credentials: htpasswd -c /etc/nginx/.htpasswd admin
#   5. nginx -t && nginx -s reload
#
# Netdata listens on 127.0.0.1:19999 via network_mode: host (Linux).
# Never expose port 19999 directly to the internet — proxy through Nginx only.

server {
    listen 80;
    server_name monitor.YOUR_BASE_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name monitor.YOUR_BASE_DOMAIN;

    # Let's Encrypt SSL — run: certbot --nginx -d monitor.YOUR_BASE_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/YOUR_BASE_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_BASE_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── Netdata (P0) ────────────────────────────────────────────────────────
    location /netdata/ {
        auth_basic "DropDeploy Monitoring";
        auth_basic_user_file /etc/nginx/.htpasswd;

        proxy_pass http://127.0.0.1:19999/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        # Keep WebSocket streaming connections alive — without this nginx drops
        # them after the default 60s read timeout, causing the Netdata UI to
        # show a continuous reconnect loop.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = / {
        return 302 /netdata/;
    }

    # ─── Grafana (P1 — uncomment when Grafana is running) ────────────────────
    # location /grafana/ {
    #     auth_basic "DropDeploy Monitoring";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #     proxy_pass http://127.0.0.1:3100/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
