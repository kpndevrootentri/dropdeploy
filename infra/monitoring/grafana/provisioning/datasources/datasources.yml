# Grafana auto-provisioned data sources (P1/P2)
# Grafana loads these on startup — no manual UI configuration needed.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 15s

